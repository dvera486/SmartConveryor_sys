<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Smart Conveyor System Simulator</title>
  <style>
    body { background: #222; color: #fff; font-family: sans-serif; }
    #controls { margin: 20px; }
    button { margin-right: 10px; }
    #speed { margin-left: 20px; }
  </style>
</head>
<body>
  <h1>3D Smart Conveyor System Simulator</h1>
  <div id="controls">
    <button id="addBox">Add Box</button>
    <button id="removeBox">Remove Box</button>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <span id="speed">Speed: 10.0</span>
    <span id="boxCount">Boxes: 0</span>
  </div>
  <div id="scene-container" style="width:800px;height:400px;"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
